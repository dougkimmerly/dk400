# dk400 - AS/400-inspired job queue system
#
# Minimal deployment: dk400 + redis
# Extend this for your deployment (add volumes, env vars, networks)

services:
  dk400:
    build: .
    container_name: dk400
    restart: unless-stopped
    ports:
      - "8400:8400"   # API
      - "8500:8500"   # Web UI
    environment:
      DATABASE_URL: postgresql://${DB_USER:-dk400}:${DB_PASSWORD:-dk400}@${DB_HOST:-dk400-postgres}:5432/${DB_NAME:-dk400}
      REDIS_URL: redis://dk400-redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: dk400-redis
    restart: unless-stopped
